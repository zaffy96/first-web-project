<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guarda Pietro!</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff00cc, #3333ff, #00ffcc, #ffff00);
      background-size: 400% 400%;
      animation: sfondoSgargiante 6s ease infinite;
      overflow: hidden;
    }

    h1 {
      margin: 0;
      max-width: 1100px;
      text-align: center;
      font-size: clamp(3.2rem, 12vw, 9rem);
      line-height: 0.95;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        6px 6px 0 #ff006e,
        12px 12px 0 #8338ec,
        18px 18px 0 #3a86ff;
      transform: rotate(-2deg);
    }

    @keyframes sfondoSgargiante {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }
  </style>
</head>

<body>
  <h1>Guarda Pietro come sono stata brava!</h1>
</body>
</html>
